services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

  app:
    build: .
    ports:
      - "7860:7860"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODELE=qwen3:7b
    depends_on:
      - ollama
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
    restart: unless-stopped

volumes:
  ollama_data:
  uploads_data:
  outputs_data:
